<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>サッカー予想掲示板</title>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; padding: 20px; }
        .box { background: #111; padding: 20px; border-radius: 12px; border: 1px solid #333; max-width: 400px; margin: auto; }
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; background: #222; color: #fff; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 20px; background: #00d4ff; color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 4px solid #00d4ff; }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="text-align:center; color:#ffc300;">⚽️ 予想送信</h2>
        <input type="text" id="name" placeholder="名前">
        <input type="text" id="score" placeholder="スコア (例 2-1)">
        <textarea id="scorer" placeholder="得点者"></textarea>
        <button onclick="sendData()" id="btn">送信する</button>
    </div>

    <div id="feed" style="max-width:400px; margin: 20px auto;"></div>

    <script>
        // 【重要】ここに新しいGASのURLを貼り付けてください
        const ENDPOINT = "ここにコピーしたURLを貼る";

        loadData();

        async function loadData() {
            try {
                const res = await fetch(ENDPOINT);
                const data = await res.json();
                document.getElementById('feed').innerHTML = data.reverse().map(d => `
                    <div class="card">
                        <div style="color:#00d4ff; font-weight:bold;">👤 ${d.name}</div>
                        <div style="font-size:1.2em; margin:10px 0;">🔢 ${d.score}</div>
                        <div style="font-size:0.8em; color:#ccc;">⚽️ ${d.scorer || 'なし'}</div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function sendData() {
            const name = document.getElementById('name').value;
            const score = document.getElementById('score').value;
            const scorer = document.getElementById('scorer').value;
            if(!name) return alert("名前を書いてね");

            const btn = document.getElementById('btn');
            btn.disabled = true;
            btn.innerText = "送信中...";

            try {
                await fetch(ENDPOINT, {
                    method: "POST",
                    body: JSON.stringify({ id: Date.now(), name: name, score: score, scorer: scorer })
                });
                location.reload(); // 送信後にページを更新
            } catch (e) {
                alert("送信に失敗しました。URLや共有設定を確認してね");
                btn.disabled = false;
                btn.innerText = "送信する";
            }
        }
    </script>
</body>
</html>
